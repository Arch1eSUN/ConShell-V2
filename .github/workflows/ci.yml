name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @conshell/core build

      - name: Build CLI
        run: pnpm --filter @conshell/cli build

      - name: Build dashboard
        run: pnpm --filter @conshell/dashboard build

      - name: Test core
        run: pnpm --filter @conshell/core test
